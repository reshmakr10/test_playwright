name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  ui_tests:
    name: UI Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install UI dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps
      - name: Run UI tests
        run: npm run ui:test
      - uses: actions/upload-artifact@v4
        with:
          name: ui-report
          path: reports/ui
          retention-days: 30

  api_tests:
    name: API Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install API dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r api-tests/requirements.txt
      - name: Run API tests
        run: pytest -c api-tests/pytest.ini --html=reports/api-report.html
      - uses: actions/upload-artifact@v4
        with:
          name: api-report
          path: reports/api-report.html
          retention-days: 30
